<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tabsway Kitchen WiFi</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* REMOVE ALL TOP SPACE */
body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
}

/* PULL CONTENT UP */
.container {
  margin-top: 0 !important;
  padding-top: 10px !important;
  padding-bottom: 20px !important;
  text-align: center;
}

/* LOGO IMPROVEMENT */
.logo {
  width: 140px;              
  max-width: 80%;
  margin-top: 0 !important;
  margin-bottom: 10px;
  display: block;
  margin-left: auto;
  margin-right: auto;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
}

/* TIGHTEN HEADER */
h1 {
  margin: 5px 0;
}

.subtitle {
  margin: 0 0 10px 0;
}

/* REDUCE SPACING */
.social-buttons {
  margin-top: 5px !important;
  margin-bottom: 10px !important;
}

.review-promo {
  margin: 8px 0 !important;
}

.progress-container {
  margin: 8px 0 !important;
}

/* CONNECT BUTTON HIGHER */
.connect {
  margin-top: 10px !important;
  padding: 14px 20px;
  border-radius: 8px;
  font-weight: 600;
  font-size: 16px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

/* BUTTON UNIFORMITY */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 22px;
  border-radius: 6px;
  text-decoration: none;
  font-weight: 600;
  font-size: 15px;
  margin: 5px 0;
  min-width: 250px;  /* optional: uniform width */
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
  transition: all 0.2s ease;
}

/* BUTTON COLORS */
.btn.instagram { background-color: #E1306C; color: #fff; }
.btn.tiktok { background-color: #000; color: #fff; }
.btn.facebook { background-color: #1877F2; color: #fff; }
.btn.snapchat-dark { background-color: #FFFC00; color: #000; }
.btn.google { background-color: #4285F4; color: #fff; }

/* HOVER EFFECTS */
.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 12px rgba(0,0,0,0.15);
}

/* SNAPCHAT BUTTON EXTRA */
.btn.snapchat-dark i {
  margin-left: -2px; /* aligns icon visually with text */
}

</style>

</head>

<body>

<div class="background-animation"></div>

<!-- Floating bubbles -->
<div class="bubble b1"></div>
<div class="bubble b2"></div>
<div class="bubble b3"></div>
<div class="bubble b4"></div>
<div class="bubble b5"></div>

<div class="container">

<img src="logo-v2.png" class="logo">

<h1>Welcome to Tabsway Kitchen</h1>

<p class="subtitle">Enjoy Free WiFi While Dining</p>

<div class="social-buttons">

<a href="https://www.instagram.com/tabswaykitchenusa?igsh=YjgwY3gwbzJiZnJr&utm_source=qr" class="btn instagram" target="_blank">
<i class="fa-brands fa-instagram"></i>
Like & Follow our Instagram
</a>

<a href="https://www.tiktok.com/@tabsway.kitchen.usa" class="btn tiktok" target="_blank">
<i class="fa-brands fa-tiktok"></i>
Follow us on TikTok
</a>

<a href="https://www.facebook.com/people/Tabsway-Kitchen-USA/61578801310852/" class="btn facebook" target="_blank">
<i class="fa-brands fa-facebook"></i>
Like our Facebook Page
</a>

<a href="https://www.snapchat.com/@tabswaykitchen" class="btn snapchat-dark" target="_blank">
<i class="fa-brands fa-snapchat"></i>
Add us on Snapchat
</a>

<a href="https://g.page/YOUR_GOOGLE_PLACE_ID/review" class="btn google" target="_blank">
<i class="fa-solid fa-star"></i>
Give us a Google Review
</a>

</div>

<div class="review-promo">
⭐ Leave a Google review and show it to staff  
to receive <b>5% OFF your next purchase</b>
</div>

<div class="progress-container">
<div class="progress-bar" id="progressBar"></div>
</div>

<button class="connect" id="connectBtn" disabled onclick="connectWifi()">
Connect to WiFi
</button>

</div>

<script src="script.js"></script>

</body>
</html>
