<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tabsway Kitchen WiFi</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="background-animation"></div>

<div class="container">

<img src="logo-v2.png" class="logo">

<h1>Welcome to Tabsway Kitchen</h1>

<p class="subtitle">Enjoy Free WiFi While Dining</p>

<div class="social-buttons">

<a href="https://instagram.com/tabsway" class="btn instagram">
<i class="fa-brands fa-instagram"></i>
Like & Follow our Instagram
</a>

<a href="https://tiktok.com/@tabsway" class="btn tiktok">
<i class="fa-brands fa-tiktok"></i>
Follow us on TikTok
</a>

<a href="https://facebook.com/tabsway" class="btn facebook">
<i class="fa-brands fa-facebook"></i>
Like our Facebook Page
</a>

<a href="https://www.google.com/maps" class="btn google">
<i class="fa-solid fa-star"></i>
Give us a Google Review
</a>

</div>

<div class="review-promo">

⭐ Leave a Google review and show it to staff  
to receive <b>5% OFF your next purchase</b>

</div>

<button class="connect" onclick="connectWifi()"> Connect to WiFi</button>

</div>

<script src="script.js"></script>

</body>
</html>
