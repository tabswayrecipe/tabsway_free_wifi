<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tabsway Kitchen WiFi</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="background-animation"></div>

<!-- Floating bubbles -->
<div class="bubble b1"></div>
<div class="bubble b2"></div>
<div class="bubble b3"></div>
<div class="bubble b4"></div>
<div class="bubble b5"></div>

<div class="container">

<img src="logo-v2.png" class="logo">

<h1>Welcome to Tabsway Kitchen</h1>

<p class="subtitle">Enjoy Free WiFi While Dining</p>

<div class="social-buttons">

<a href="https://instagram.com/tabsway" class="btn instagram" target="_blank">
<i class="fa-brands fa-instagram"></i>
Like & Follow our Instagram
</a>

<a href="https://tiktok.com/@tabsway" class="btn tiktok" target="_blank">
<i class="fa-brands fa-tiktok"></i>
Follow us on TikTok
</a>

<a href="https://facebook.com/tabsway" class="btn facebook" target="_blank">
<i class="fa-brands fa-facebook"></i>
Like our Facebook Page
</a>

<a href="https://g.page/YOUR_GOOGLE_PLACE_ID/review" class="btn google" target="_blank">
<i class="fa-solid fa-star"></i>
Give us a Google Review
</a>

</div>

<div class="review-promo">

⭐ Leave a Google review and show it to staff  
to receive <b>5% OFF your next purchase</b>

</div>

<div class="progress-container">
<div class="progress-bar" id="progressBar"></div>
</div>

<button class="connect" id="connectBtn" disabled onclick="connectWifi()">

Connect to WiFi

</button>

</div>

<script src="script.js"></script>

</body>
</html>
